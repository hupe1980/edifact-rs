# cargo-deny configuration for edifact-rs
# Run: cargo deny check

[advisories]
# Deny dependencies with security advisories.
ignore = []

[bans]
# Deny multiple versions of the same crate in the dependency tree.
multiple-versions = "warn"
# Deny wildcard dependencies.
wildcards = "deny"
# Known allowed duplicates (common in transitive graphs).
skip = []

[licenses]
# Allow only OSI-approved permissive licenses.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "Unicode-DFS-2016",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "Zlib",
]
confidence-threshold = 0.8

[sources]
# Only allow crates.io as a source.
unknown-registry = "deny"
unknown-git = "deny"
