name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    name: publish
    environment: crates-io
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Verify crate versions match git tag
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          main_ver=$(cargo metadata --no-deps --format-version 1 \
            | python3 -c "import sys,json; pkgs=json.load(sys.stdin)['packages']; \
              print(next(p['version'] for p in pkgs if p['name']=='edifact-rs'))")
          echo "tag=${tag}  edifact-rs=${main_ver}"
          if [[ "${tag}" != "${main_ver}" ]]; then
            echo "Git tag v${tag} does not match crate version ${main_ver}"
            exit 1
          fi

      - name: Verify crate versions match across workspace
        shell: bash
        run: |
          set -euo pipefail
          derive_ver=$(cargo metadata --no-deps --format-version 1 \
            | python3 -c "import sys,json; pkgs=json.load(sys.stdin)['packages']; \
              print(next(p['version'] for p in pkgs if p['name']=='edifact-rs-derive'))")
          main_ver=$(cargo metadata --no-deps --format-version 1 \
            | python3 -c "import sys,json; pkgs=json.load(sys.stdin)['packages']; \
              print(next(p['version'] for p in pkgs if p['name']=='edifact-rs'))")
          echo "edifact-rs-derive=${derive_ver}  edifact-rs=${main_ver}"
          if [[ "${derive_ver}" != "${main_ver}" ]]; then
            echo "Version mismatch: derive=${derive_ver} main=${main_ver}"
            exit 1
          fi

      - name: Publish edifact-rs-derive
        run: cargo publish -p edifact-rs-derive
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io to index edifact-rs-derive
        run: sleep 30

      - name: Publish edifact-rs
        run: cargo publish -p edifact-rs
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
